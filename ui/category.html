<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Category UI</title>
  </head>
  <body>
    <div>
      <a href="./category.html">Category</a>
      <a href="./menu.html">Menu</a>
      <a href="./order.html">Order</a>
      <a href="./user.html">User</a>
    </div>

    <hr />

    <h1>Create Category</h1>

    <input id="name" placeholder="Category name" />
    <button onclick="createCategory()">Create</button>
    <div id="message"></div>

    <script>
      const API_URL = 'http://localhost:9999/category';
      const $ = (id) => document.getElementById(id);
      const showMessage = (msg) => ($('message').textContent = msg);

      async function handleResponse(res) {
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.message || 'Request failed');
        return data;
      }

      async function createCategory() {
        const name = $('name').value.trim();
        if (!name) {
          return showMessage('Name is required.');
        }
        try {
          const data = await handleResponse(
            await fetch(API_URL, {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify({ name }),
            }),
          );
          $('name').value = '';
          showMessage(`Created category successfully: "${data.name}"`);
        } catch (error) {
          showMessage(error.message);
        }
      }
    </script>
  </body>
</html>
